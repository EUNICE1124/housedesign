<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | HouseDesign</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--navy);">

    <div class="card" style="width: 100%; max-width: 400px; text-align: center; background: white; padding: 40px; border-radius: 8px;">
        <img src="images/logo.png" alt="Logo" style="width: 80px; margin-bottom: 20px; border-radius: 50%; border: 2px solid var(--navy);">
        <h2 style="color: var(--navy); margin-bottom: 20px;">ENGINEER PORTAL</h2>
        
        <form onsubmit="handleLogin(event)">
            <input type="text" id="adminName" placeholder="Admin Username" required 
                   style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px;">
            
            <input type="password" id="adminPass" placeholder="Enter Access Code" required 
                   style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px;">
            
            <button type="submit" class="btn-red" style="width: 100%; cursor: pointer; border: none;">Unlock Dashboard</button>
        </form>
        
        <p id="errorMsg" style="color: var(--safety-red); display: none; margin-top: 15px; font-weight: bold;">Access Denied: Invalid Credentials</p>
        <a href="index.html" style="display: block; margin-top: 20px; font-size: 0.8rem; color: #666; text-decoration: none;">← Back to Public Site</a>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const user = document.getElementById('adminName').value;
            const pass = document.getElementById('adminPass').value;

            // Security Check: Validates both Name and Password
            if (user === "Tchouelaeric" && pass === "0218HD") {
                // Use sessionStorage to keep the user logged in for this browser session
                sessionStorage.setItem('isAdmin', 'true');
                window.location.href = "admin.php";
            } else {
                document.getElementById('errorMsg').style.display = "block";
                // Reset password field on failure
                document.getElementById('adminPass').value = "";
            }
        }
    </script>
</body>
</html>
